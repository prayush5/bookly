name: Run Pytest Suite

on:
    push:
        branches: ["main", "master"]
    pull_request:
        branches: ["main", "master"]

jobs:
    test:
        runs-on: ubuntu-latest
        services:
            redis:
                image: redis:alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - name: Check out code 
              uses: actions/checkout@v4

            - name: Set up python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
                cache: pip
            
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                pip install pytest pytest-cov
            
            - name: Run pytest
              env:
                REDIS_URL: "redis://localhost:6379/0"
                JWT_SECRET: "ci-testing-secret-key"
                JWT_ALGORITHM: "HS256"
                DATABASE_URL: "postgresql+asyncpg://postgres:prayush%407797@localhost:5432/bookly"
              run: |
                pytest